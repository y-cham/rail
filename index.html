<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근무 스케줄</title>
<style>
*{box-sizing:border-box}html,body{width:100%;overflow-x:hidden}body{margin:0;font-family:Arial,sans-serif;background:#f4f6fb;color:#1f2937;padding-bottom:74px}header{background:#2563eb;color:white;text-align:center;padding:15px;font-size:20px;font-weight:800}.container{width:100%;max-width:980px;margin:0 auto;padding:12px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:8px 0 12px}.topbar h2{margin:0;font-size:20px;white-space:nowrap}button{border:0;border-radius:10px;padding:10px 14px;background:#2563eb;color:white;font-weight:800;cursor:pointer}.calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;width:100%}.weekday{text-align:center;font-weight:900;padding:8px 0;color:#374151}.weekday.sun{color:#dc2626}.weekday.sat{color:#2563eb}.day{min-width:0;min-height:92px;background:white;border-radius:13px;padding:7px;border:2px solid transparent;box-shadow:0 1px 4px #0001;cursor:pointer;overflow:hidden}.day.empty{background:transparent;box-shadow:none;cursor:default}.date-number{font-weight:900;font-size:14px}.base-shift{display:inline-block;margin-top:5px;padding:3px 7px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:900}.base-shift.edited{background:#fef3c7;color:#92400e}.extra-shift{margin-top:4px;font-size:10.5px;font-weight:900;color:#b45309;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.others-row{display:flex;gap:3px;flex-wrap:nowrap;margin-top:4px;font-size:9.5px;white-space:nowrap;overflow:hidden}.other-shift{background:#f3f4f6;border-radius:999px;padding:2px 4px;font-weight:800}.today{border-color:#2563eb;background:#eff6ff;position:relative}.today::after{content:"TODAY";position:absolute;top:5px;right:6px;color:#2563eb;font-size:9px;font-weight:900}.team-select,.card{background:white;border-radius:15px;padding:14px;box-shadow:0 1px 5px #0001;margin-top:16px}.team-options{display:flex;justify-content:space-around;margin-top:10px}.team-options label{font-weight:900}.hint{margin-top:10px;font-size:12px;color:#6b7280;line-height:1.45}.tab-page{display:none}.tab-page.active{display:block}.bottom-nav{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid #e5e7eb;display:flex;gap:8px;padding:8px 10px;z-index:20}.nav-btn{flex:1;background:#e5e7eb;color:#374151}.nav-btn.active{background:#2563eb;color:white}.step-title{font-size:21px;font-weight:900;margin:0 0 6px}.step-sub{color:#6b7280;margin:0 0 16px}.choice-grid{display:grid;gap:10px}.choice{width:100%;text-align:left;padding:16px;border-radius:14px;background:#f8fafc;color:#111827;border:1px solid #e5e7eb;font-size:17px;display:flex;justify-content:space-between;align-items:center}.choice span{color:#6b7280;font-size:13px}.back,.gray{background:#6b7280}.red{background:#ef4444}.summary{font-size:14px;color:#4b5563;margin-bottom:12px}.check-item{display:flex;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid #eef2f7}.check-item input{width:20px;height:20px}textarea{width:100%;min-height:90px;border:1px solid #d1d5db;border-radius:12px;padding:12px;font-size:15px}.modal-bg{display:none;position:fixed;inset:0;background:#0007;z-index:30;align-items:center;justify-content:center;padding:18px}.modal-bg.active{display:flex}.modal{width:100%;max-width:370px;background:white;border-radius:18px;padding:18px;box-shadow:0 15px 40px #0004}.modal h3{margin:0 0 8px;font-size:20px}.modal p{margin:0 0 12px;color:#6b7280;font-size:14px}.modal-label{display:block;margin:9px 0 5px;font-size:13px;font-weight:900;color:#374151}.shift-select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;font-size:16px;margin-bottom:8px}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}@media(max-width:620px){body{padding-bottom:70px}header{font-size:18px;padding:13px}.container{padding:6px}.topbar{gap:5px;margin:8px 0 10px}.topbar h2{font-size:16px}button{padding:8px 9px;font-size:13px}.calendar{gap:2px}.weekday{font-size:12px;padding:6px 0}.day{min-height:74px;padding:3px;border-radius:8px;border-width:1.5px}.date-number{font-size:11px}.base-shift{font-size:9px;padding:2px 4px;margin-top:3px}.extra-shift{font-size:7.8px;margin-top:2px;letter-spacing:-.4px}.others-row{gap:1px;font-size:6.9px;letter-spacing:-.5px;margin-top:2px}.other-shift{padding:1px 2px}.today::after{font-size:6px;top:3px;right:3px}.team-select{padding:12px;margin-top:12px}.team-options label{font-size:14px}.bottom-nav{padding:7px 8px}.nav-btn{font-size:13px}}
</style>
</head>
<body>
<header>근무 스케줄</header>
<main id="calendarPage" class="tab-page active"><div class="container"><div class="topbar"><button onclick="prevMonth()">이전</button><h2 id="monthTitle"></h2><button onclick="nextMonth()">다음</button></div><div id="calendar" class="calendar"></div><section class="team-select"><strong>근무조 선택</strong><div class="team-options"><label><input type="radio" name="team" value="A" checked> A조</label><label><input type="radio" name="team" value="B"> B조</label><label><input type="radio" name="team" value="C"> C조</label><label><input type="radio" name="team" value="D"> D조</label></div><div class="hint">날짜를 누르면 내 근무와 추가근무를 따로 저장할 수 있습니다. 예: 첫 줄 휴무, 둘째 줄 D조 1/4.</div></section></div></main>
<main id="workPage" class="tab-page"><div class="container"><section id="workCard" class="card"></section></div></main>
<div id="shiftModal" class="modal-bg" onclick="closeShiftModal(event)"><div class="modal" onclick="event.stopPropagation()"><h3 id="modalTitle">근무 변경</h3><p id="modalDesc"></p><label class="modal-label">내 근무</label><select id="baseShiftSelect" class="shift-select"><option value="주간">주간</option><option value="야간">야간</option><option value="비번">비번</option><option value="휴무">휴무</option></select><label class="modal-label">추가근무</label><select id="extraTypeSelect" class="shift-select" onchange="toggleExtraBox()"><option value="">없음</option><option value="1/4">1/4 근무</option><option value="1/2">1/2 근무</option></select><div id="extraTeamBox"><label class="modal-label">들어가는 조</label><select id="extraTeamSelect" class="shift-select"><option value="A">A조</option><option value="B">B조</option><option value="C">C조</option><option value="D">D조</option></select></div><div class="modal-actions"><button onclick="saveShiftEdit()">저장</button><button class="gray" onclick="hideShiftModal()">취소</button><button class="red" onclick="clearShiftEdit()">기본값</button><button class="gray" onclick="hideShiftModal()">닫기</button></div></div></div>
<nav class="bottom-nav"><button id="calendarNav" class="nav-btn active" onclick="showTab('calendar')">📅 캘린더</button><button id="workNav" class="nav-btn" onclick="showTab('work')">✅ 업무</button></nav>
<script>
const TEAMS=['A','B','C','D'];const BASE_DATE=new Date(2026,6,2);const SHIFT_PATTERN={A:['휴무','주간','야간','비번'],B:['주간','야간','비번','휴무'],C:['야간','비번','휴무','주간'],D:['비번','휴무','주간','야간']};const WORK_TASKS={안내:{주간:['09:10 화장실 점검','09:10 리프트 점검','09:10 유실물 갯수 확인','10:00 수유방 점검','11:00 화장실 점검','13:00 화장실 점검','14:00 수유방 점검','15:00 화장실 점검','17:00 화장실 점검','17:00 유실물 갯수 확인'],야간:['야간 인수인계 확인','승강장 점검','심야 순회','화장실 상태 확인','특이사항 기록']},매표:{주간:['창구 주변 정리','승차권 발권 상태 확인','환불·변경 민원 확인','마감 전 현금·영수증 확인','특이사항 기록'],야간:['창구 마감 확인','민원 기록 확인','특이사항 인수인계']},상황근무:{주간:['상황 접수 내용 확인','관련 부서 연락','현장 확인','조치 내용 기록','인수인계 작성'],야간:['상황 접수 내용 확인','심야 현장 확인','조치 내용 기록','인수인계 작성']}};
const els={calendar:document.getElementById('calendar'),monthTitle:document.getElementById('monthTitle'),workCard:document.getElementById('workCard'),shiftModal:document.getElementById('shiftModal'),baseShiftSelect:document.getElementById('baseShiftSelect'),extraTypeSelect:document.getElementById('extraTypeSelect'),extraTeamSelect:document.getElementById('extraTeamSelect'),extraTeamBox:document.getElementById('extraTeamBox'),modalTitle:document.getElementById('modalTitle'),modalDesc:document.getElementById('modalDesc')};let currentDate=new Date(),selectedTeam=localStorage.getItem('selectedTeam')||'A',editingDateKey=null,workState={type:null,time:null,direction:null};
function pad(n){return String(n).padStart(2,'0')}function dateKey(date){return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`}function storeKey(team,key){return `scheduleEdit:${team}:${key}`}function defaultShift(team,date){const diff=Math.floor((date-BASE_DATE)/86400000);return SHIFT_PATTERN[team][((diff%4)+4)%4]}function readSchedule(team,date){const key=dateKey(date),raw=localStorage.getItem(storeKey(team,key)),base=defaultShift(team,date);if(!raw)return{base,extraType:'',extraTeam:''};try{const d=JSON.parse(raw);return{base:d.base||base,extraType:d.extraType||'',extraTeam:d.extraTeam||''}}catch{return{base:raw||base,extraType:'',extraTeam:''}}}function isEdited(team,date){return localStorage.getItem(storeKey(team,dateKey(date)))!==null}function extraText(d){return d.extraType&&d.extraTeam?`${d.extraTeam}조 ${d.extraType}`:''}function isWorking(d){return d.base==='주간'||d.base==='야간'||!!d.extraType}
function renderCalendar(){els.calendar.innerHTML='';const y=currentDate.getFullYear(),m=currentDate.getMonth();els.monthTitle.textContent=`${y}년 ${m+1}월`;['일','월','화','수','목','금','토'].forEach((day,i)=>{const div=document.createElement('div');div.className='weekday'+(i===0?' sun':'')+(i===6?' sat':'');div.textContent=day;els.calendar.appendChild(div)});const first=new Date(y,m,1),last=new Date(y,m+1,0).getDate();for(let i=0;i<first.getDay();i++){const e=document.createElement('div');e.className='day empty';els.calendar.appendChild(e)}for(let d=1;d<=last;d++){const date=new Date(y,m,d),cell=document.createElement('div');cell.className='day';cell.onclick=()=>openShiftModal(date);const today=new Date();if(date.getFullYear()===today.getFullYear()&&date.getMonth()===today.getMonth()&&date.getDate()===today.getDate())cell.classList.add('today');const mine=readSchedule(selectedTeam,date);const others=TEAMS.filter(t=>t!==selectedTeam).map(t=>({team:t,data:readSchedule(t,date)})).filter(x=>isWorking(x.data));cell.innerHTML=`<div class="date-number">${d}</div><div class="base-shift ${isEdited(selectedTeam,date)?'edited':''}">${mine.base}</div>${extraText(mine)?`<div class="extra-shift">${extraText(mine)}</div>`:''}<div class="others-row">${others.map(o=>`<span class="other-shift">${o.team}${o.data.base}${o.data.extraType?'+'+o.data.extraType:''}</span>`).join('')}</div>`;els.calendar.appendChild(cell)}}function prevMonth(){currentDate.setMonth(currentDate.getMonth()-1);renderCalendar()}function nextMonth(){currentDate.setMonth(currentDate.getMonth()+1);renderCalendar()}
function toggleExtraBox(){els.extraTeamBox.style.display=els.extraTypeSelect.value?'block':'none'}function openShiftModal(date){editingDateKey=dateKey(date);const d=readSchedule(selectedTeam,date);els.baseShiftSelect.value=d.base;els.extraTypeSelect.value=d.extraType;els.extraTeamSelect.value=d.extraTeam||'D';toggleExtraBox();els.modalTitle.textContent=`${editingDateKey} 근무 변경`;els.modalDesc.textContent=`${selectedTeam}조 기본 근무는 ${defaultShift(selectedTeam,date)}입니다.`;els.shiftModal.classList.add('active')}function hideShiftModal(){els.shiftModal.classList.remove('active');editingDateKey=null}function closeShiftModal(e){if(e.target===els.shiftModal)hideShiftModal()}function saveShiftEdit(){if(!editingDateKey)return;const d={base:els.baseShiftSelect.value,extraType:els.extraTypeSelect.value,extraTeam:els.extraTypeSelect.value?els.extraTeamSelect.value:''};localStorage.setItem(storeKey(selectedTeam,editingDateKey),JSON.stringify(d));hideShiftModal();renderCalendar()}function clearShiftEdit(){if(!editingDateKey)return;localStorage.removeItem(storeKey(selectedTeam,editingDateKey));hideShiftModal();renderCalendar()}
function showTab(tab){document.getElementById('calendarPage').classList.toggle('active',tab==='calendar');document.getElementById('workPage').classList.toggle('active',tab==='work');document.getElementById('calendarNav').classList.toggle('active',tab==='calendar');document.getElementById('workNav').classList.toggle('active',tab==='work');if(tab==='work')renderWorkStep()}function renderWorkStep(){if(!workState.type){els.workCard.innerHTML=`<p class="step-title">업무 종류 선택</p><p class="step-sub">먼저 어떤 업무인지 골라주세요.</p><div class="choice-grid"><button class="choice" onclick="setWork('type','안내')">안내 <span>승강장·고객 안내</span></button><button class="choice" onclick="setWork('type','매표')">매표 <span>승차권·창구 업무</span></button><button class="choice" onclick="setWork('type','상황근무')">상황근무 <span>상황 대응·기록</span></button></div>`;return}if(!workState.time){els.workCard.innerHTML=`<button class="back" onclick="backWork('type')">← 이전</button><p class="step-title">근무시간 선택</p><p class="step-sub">${workState.type} 업무의 근무시간을 골라주세요.</p><div class="choice-grid"><button class="choice" onclick="setWork('time','주간')">주간 <span>낮 근무</span></button><button class="choice" onclick="setWork('time','야간')">야간 <span>밤 근무</span></button></div>`;return}if(workState.type==='안내'&&!workState.direction){els.workCard.innerHTML=`<button class="back" onclick="backWork('time')">← 이전</button><p class="step-title">방향 선택</p><p class="step-sub">안내할 방향을 골라주세요.</p><div class="choice-grid"><button class="choice" onclick="setWork('direction','상행')">상행 <span>익산·서울 방면</span></button><button class="choice" onclick="setWork('direction','하행')">하행 <span>순천·여수 방면</span></button></div>`;return}renderChecklist()}function setWork(k,v){workState[k]=v;renderWorkStep()}function backWork(k){if(k==='type')workState={type:null,time:null,direction:null};if(k==='time'){workState.time=null;workState.direction=null}if(k==='direction')workState.direction=null;renderWorkStep()}function resetWork(){workState={type:null,time:null,direction:null};renderWorkStep()}function renderChecklist(){const title=[workState.type,workState.time,workState.direction].filter(Boolean).join(' · ');const items=WORK_TASKS[workState.type]?.[workState.time]||[];const backTarget=workState.type==='안내'?'direction':'time';els.workCard.innerHTML=`<button class="back" onclick="backWork('${backTarget}')">← 이전</button><p class="step-title">체크리스트</p><div class="summary">${title}</div>${items.map((item,i)=>`<label class="check-item"><input type="checkbox" id="ck${i}"><span>${item}</span></label>`).join('')}<p class="step-sub" style="margin-top:16px;">메모</p><textarea placeholder="특이사항을 적어주세요"></textarea><button style="width:100%;margin-top:12px" onclick="resetWork()">처음부터 다시 선택</button>`}
document.querySelectorAll("input[name='team']").forEach(r=>{r.checked=r.value===selectedTeam;r.addEventListener('change',e=>{selectedTeam=e.target.value;localStorage.setItem('selectedTeam',selectedTeam);renderCalendar()})});renderCalendar();
</script>
</body>
</html>
