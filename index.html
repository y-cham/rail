<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>근무 스케줄</title><style>*{box-sizing:border-box}body{margin:0;background:#f4f6fb;font-family:Arial,sans-serif;color:#111827;padding-bottom:70px}header{background:#2563eb;color:white;text-align:center;padding:15px;font-size:20px;font-weight:900}.wrap{max-width:900px;margin:auto;padding:10px}.bar{display:flex;justify-content:space-between;align-items:center}.bar h2{font-size:20px}button{border:0;border-radius:10px;background:#2563eb;color:white;font-weight:800;padding:10px 14px}.cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px}.wd{text-align:center;font-weight:900;padding:7px}.sun{color:#dc2626}.sat{color:#2563eb}.day{min-height:90px;background:white;border-radius:12px;padding:7px;border:2px solid transparent;box-shadow:0 1px 4px #0001;overflow:hidden}.empty{background:transparent;box-shadow:none}.num{font-weight:900;font-size:14px}.mine{display:inline-block;margin-top:5px;padding:3px 7px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:900}.edited{background:#fef3c7!important;color:#92400e!important}.extra{margin-top:4px;font-size:11px;font-weight:900;color:#b45309;white-space:nowrap}.others{display:flex;gap:3px;margin-top:4px;font-size:9px;white-space:nowrap;overflow:hidden}.other{background:#f3f4f6;border-radius:999px;padding:2px 4px;font-weight:800}.today{border-color:#2563eb;background:#eff6ff;position:relative}.today:after{content:'TODAY';position:absolute;top:5px;right:5px;color:#2563eb;font-size:9px;font-weight:900}.card{background:white;border-radius:15px;padding:14px;margin-top:15px;box-shadow:0 1px 5px #0001}.teams{display:flex;justify-content:space-around;margin-top:10px}.teams label{font-weight:900}.hint{font-size:12px;color:#6b7280;margin-top:10px;line-height:1.45}.page{display:none}.page.on{display:block}.nav{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid #e5e7eb;display:flex;gap:8px;padding:8px}.nav button{flex:1;background:#e5e7eb;color:#374151}.nav button.on{background:#2563eb;color:white}.choice{display:block;width:100%;text-align:left;margin:8px 0;padding:16px;background:#f8fafc;color:#111827;border:1px solid #e5e7eb}.back,.gray{background:#6b7280}.red{background:#ef4444}.check{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid #eef2f7}.check input{width:20px;height:20px}select,textarea{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;font-size:16px;margin:5px 0 8px}.modal-bg{display:none;position:fixed;inset:0;background:#0007;align-items:center;justify-content:center;padding:18px;z-index:20}.modal-bg.on{display:flex}.modal{width:100%;max-width:370px;background:white;border-radius:18px;padding:18px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}@media(max-width:620px){header{font-size:18px;padding:13px}.wrap{padding:6px}.bar h2{font-size:16px}button{padding:8px 9px;font-size:13px}.cal{gap:2px}.wd{font-size:12px;padding:6px 0}.day{min-height:74px;padding:3px;border-radius:8px}.num{font-size:11px}.mine{font-size:9px;padding:2px 4px}.extra{font-size:8px}.others{font-size:7px;letter-spacing:-.5px}.other{padding:1px 2px}.teams label{font-size:14px}.today:after{font-size:6px}}</style></head><body><header>근무 스케줄</header><main id="calPage" class="page on"><div class="wrap"><div class="bar"><button onclick="moveMonth(-1)">이전</button><h2 id="title"></h2><button onclick="moveMonth(1)">다음</button></div><div id="cal" class="cal"></div><section class="card"><b>근무조 선택</b><div class="teams"><label><input name="team" type="radio" value="A" checked>A조</label><label><input name="team" type="radio" value="B">B조</label><label><input name="team" type="radio" value="C">C조</label><label><input name="team" type="radio" value="D">D조</label></div><div class="hint">날짜를 누르면 내 근무와 추가근무를 따로 저장할 수 있습니다. 예: 첫 줄 휴무, 둘째 줄 D조 전부.</div></section></div></main><main id="workPage" class="page"><div class="wrap"><section id="work" class="card"></section></div></main><div id="modal" class="modal-bg" onclick="if(event.target.id==='modal')closeModal()"><div class="modal"><h3 id="mTitle">근무 변경</h3><p id="mDesc"></p><b>내 근무</b><select id="base"><option>주간</option><option>야간</option><option>비번</option><option>휴무</option></select><b>추가근무</b><select id="extra" onchange="toggleExtra()"><option value="">없음</option><option value="1/4">1/4 근무</option><option value="1/2">1/2 근무</option><option value="전부">전부 근무</option></select><div id="extraBox"><b>들어가는 조</b><select id="extraTeam"><option>A</option><option>B</option><option>C</option><option>D</option></select></div><div class="actions"><button onclick="saveEdit()">저장</button><button class="gray" onclick="closeModal()">취소</button><button class="red" onclick="clearEdit()">기본값</button><button class="gray" onclick="closeModal()">닫기</button></div></div></div><nav class="nav"><button id="calBtn" class="on" onclick="show('cal')">📅 캘린더</button><button id="workBtn" onclick="show('work')">✅ 업무</button></nav><script>const teams=['A','B','C','D'],baseDate=new Date(2026,6,2),pattern={A:['휴무','주간','야간','비번'],B:['주간','야간','비번','휴무'],C:['야간','비번','휴무','주간'],D:['비번','휴무','주간','야간']};const tasks={안내:{주간:['09:10 화장실 점검','09:10 리프트 점검','09:10 유실물 갯수 확인','10:00 수유방 점검','11:00 화장실 점검','13:00 화장실 점검','14:00 수유방 점검','15:00 화장실 점검','17:00 화장실 점검','17:00 유실물 갯수 확인'],야간:['야간 인수인계 확인','승강장 점검','심야 순회','화장실 상태 확인','특이사항 기록']},매표:{주간:['창구 주변 정리','승차권 발권 상태 확인','환불·변경 민원 확인','마감 전 현금·영수증 확인','특이사항 기록'],야간:['창구 마감 확인','민원 기록 확인','특이사항 인수인계']},상황근무:{주간:['상황 접수 내용 확인','관련 부서 연락','현장 확인','조치 내용 기록','인수인계 작성'],야간:['상황 접수 내용 확인','심야 현장 확인','조치 내용 기록','인수인계 작성']}};let cur=new Date(),team=localStorage.team||'A',editKey=null,workState={type:null,time:null,dir:null};document.querySelectorAll('input[name=team]').forEach(r=>{r.checked=r.value===team;r.onchange=e=>{team=e.target.value;localStorage.team=team;render()}});function pad(n){return String(n).padStart(2,'0')}function dkey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function sk(t,k){return `edit:${t}:${k}`}function def(t,d){let diff=Math.floor((d-baseDate)/86400000);return pattern[t][((diff%4)+4)%4]}function read(t,d){let raw=localStorage.getItem(sk(t,dkey(d))),b=def(t,d);if(!raw)return{base:b,extra:'',extraTeam:''};try{let o=JSON.parse(raw);return{base:o.base||b,extra:o.extra||'',extraTeam:o.extraTeam||''}}catch{return{base:raw||b,extra:'',extraTeam:''}}}function edited(t,d){return localStorage.getItem(sk(t,dkey(d)))!==null}function extraText(x){return x.extra&&x.extraTeam?`${x.extraTeam}조 ${x.extra}`:''}function working(x){return x.base==='주간'||x.base==='야간'||x.extra}function render(){cal.innerHTML='';let y=cur.getFullYear(),m=cur.getMonth();title.textContent=`${y}년 ${m+1}월`;['일','월','화','수','목','금','토'].forEach((w,i)=>{let e=document.createElement('div');e.className='wd '+(i==0?'sun':i==6?'sat':'');e.textContent=w;cal.appendChild(e)});let first=new Date(y,m,1),last=new Date(y,m+1,0).getDate();for(let i=0;i<first.getDay();i++){let e=document.createElement('div');e.className='day empty';cal.appendChild(e)}for(let n=1;n<=last;n++){let d=new Date(y,m,n),cell=document.createElement('div');cell.className='day';cell.onclick=()=>openModal(d);let today=new Date();if(d.toDateString()===today.toDateString())cell.classList.add('today');let mine=read(team,d),others=teams.filter(t=>t!==team).map(t=>({t,data:read(t,d)})).filter(o=>working(o.data));cell.innerHTML=`<div class="num">${n}</div><div class="mine ${edited(team,d)?'edited':''}">${mine.base}</div>${extraText(mine)?`<div class="extra">${extraText(mine)}</div>`:''}<div class="others">${others.map(o=>`<span class="other">${o.t}${o.data.base}${o.data.extra?'+'+o.data.extra:''}</span>`).join('')}</div>`;cal.appendChild(cell)}}function moveMonth(v){cur.setMonth(cur.getMonth()+v);render()}function toggleExtra(){extraBox.style.display=extra.value?'block':'none'}function openModal(d){editKey=dkey(d);let x=read(team,d);base.value=x.base;extra.value=x.extra;extraTeam.value=x.extraTeam||'D';toggleExtra();mTitle.textContent=`${editKey} 근무 변경`;mDesc.textContent=`${team}조 기본 근무는 ${def(team,d)}입니다.`;modal.classList.add('on')}function closeModal(){modal.classList.remove('on');editKey=null}function saveEdit(){if(!editKey)return;localStorage.setItem(sk(team,editKey),JSON.stringify({base:base.value,extra:extra.value,extraTeam:extra.value?extraTeam.value:''}));closeModal();render()}function clearEdit(){if(!editKey)return;localStorage.removeItem(sk(team,editKey));closeModal();render()}function show(p){calPage.classList.toggle('on',p==='cal');workPage.classList.toggle('on',p==='work');calBtn.classList.toggle('on',p==='cal');workBtn.classList.toggle('on',p==='work');if(p==='work')workStep()}function workStep(){if(!workState.type){work.innerHTML='<h2>업무 종류 선택</h2><button class="choice" onclick="setWork(\'type\',\'안내\')">안내</button><button class="choice" onclick="setWork(\'type\',\'매표\')">매표</button><button class="choice" onclick="setWork(\'type\',\'상황근무\')">상황근무</button>';return}if(!workState.time){work.innerHTML=`<button class="back" onclick="backWork('type')">← 이전</button><h2>근무시간 선택</h2><button class="choice" onclick="setWork('time','주간')">주간</button><button class="choice" onclick="setWork('time','야간')">야간</button>`;return}if(workState.type==='안내'&&!workState.dir){work.innerHTML=`<button class="back" onclick="backWork('time')">← 이전</button><h2>방향 선택</h2><button class="choice" onclick="setWork('dir','상행')">상행</button><button class="choice" onclick="setWork('dir','하행')">하행</button>`;return}checklist()}function setWork(k,v){workState[k]=v;workStep()}function backWork(k){if(k==='type')workState={type:null,time:null,dir:null};if(k==='time'){workState.time=null;workState.dir=null}if(k==='dir')workState.dir=null;workStep()}function resetWork(){workState={type:null,time:null,dir:null};workStep()}function checklist(){let list=tasks[workState.type][workState.time]||[],ttl=[workState.type,workState.time,workState.dir].filter(Boolean).join(' · ');work.innerHTML=`<button class="back" onclick="backWork('${workState.type==='안내'?'dir':'time'}')">← 이전</button><h2>체크리스트</h2><p>${ttl}</p>${list.map(x=>`<label class="check"><input type="checkbox"><span>${x}</span></label>`).join('')}<p>메모</p><textarea placeholder="특이사항을 적어주세요"></textarea><button style="width:100%;margin-top:12px" onclick="resetWork()">처음부터 다시 선택</button>`}render();</script></body></html>
