<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>와이샴 근무 관리</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:#f4f6fb; color:#1f2937; padding-bottom:76px; }
    header { background:#2563eb; color:white; padding:16px; text-align:center; font-size:20px; font-weight:700; }
    .container { max-width:960px; margin:0 auto; padding:14px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:10px 0 14px; }
    .topbar h2 { margin:0; font-size:20px; }
    button { border:0; border-radius:10px; padding:10px 14px; background:#2563eb; color:white; font-weight:700; cursor:pointer; }
    .calendar { display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; }
    .weekday { text-align:center; padding:8px 0; font-weight:800; color:#374151; }
    .weekday.sun { color:#dc2626; }
    .weekday.sat { color:#2563eb; }
    .day { min-height:82px; background:white; border-radius:12px; padding:7px; border:2px solid transparent; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .day.empty { background:transparent; box-shadow:none; }
    .date-number { font-weight:800; font-size:14px; }
    .my-shift { margin:6px 0 5px; display:inline-block; padding:3px 7px; border-radius:999px; font-size:12px; font-weight:800; background:#eef2ff; color:#3730a3; }
    .others-row { display:flex; gap:4px; flex-wrap:nowrap; align-items:center; font-size:10.5px; white-space:nowrap; }
    .other-shift { padding:2px 5px; border-radius:999px; background:#f3f4f6; font-weight:700; }
    .today { border-color:#2563eb; background:#eff6ff; position:relative; }
    .today::after { content:"TODAY"; position:absolute; top:5px; right:6px; color:#2563eb; font-size:9px; font-weight:900; }
    .team-select { margin:18px 0 8px; background:white; border-radius:14px; padding:14px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .team-options { display:flex; justify-content:space-around; margin-top:10px; }
    .team-options label { font-weight:800; }
    .tab-page { display:none; }
    .tab-page.active { display:block; }
    .bottom-nav { position:fixed; left:0; right:0; bottom:0; background:white; border-top:1px solid #e5e7eb; display:flex; justify-content:center; gap:8px; padding:8px 10px; z-index:10; }
    .nav-btn { flex:1; max-width:240px; background:#e5e7eb; color:#374151; }
    .nav-btn.active { background:#2563eb; color:white; }
    .card { background:white; border-radius:16px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:14px; }
    .step-title { font-size:21px; font-weight:900; margin:0 0 6px; }
    .step-sub { color:#6b7280; margin:0 0 16px; }
    .choice-grid { display:grid; grid-template-columns:1fr; gap:10px; }
    .choice { width:100%; text-align:left; padding:16px; border-radius:14px; background:#f8fafc; color:#111827; border:1px solid #e5e7eb; font-size:17px; display:flex; justify-content:space-between; align-items:center; }
    .choice span { color:#6b7280; font-size:13px; font-weight:500; }
    .back { background:#6b7280; margin-bottom:12px; }
    .summary { font-size:14px; color:#4b5563; margin-bottom:12px; }
    .check-item { display:flex; gap:10px; align-items:center; padding:12px 0; border-bottom:1px solid #eef2f7; }
    .check-item input { width:20px; height:20px; }
    textarea { width:100%; min-height:90px; border:1px solid #d1d5db; border-radius:12px; padding:12px; font-size:15px; }
    @media (max-width:620px){
      .container { padding:10px; }
      .calendar { gap:4px; }
      .day { min-height:72px; padding:5px; border-radius:9px; }
      .weekday { font-size:13px; }
      .date-number { font-size:12px; }
      .my-shift { font-size:10.5px; padding:2px 5px; margin:5px 0 4px; }
      .others-row { gap:2px; font-size:8.6px; }
      .other-shift { padding:1px 3px; }
      .today::after { font-size:7px; top:4px; right:4px; }
    }
  </style>
</head>
<body>
<header>와이샴 근무 관리</header>

<div id="calendarPage" class="tab-page active">
  <div class="container">
    <div class="topbar">
      <button onclick="prevMonth()">이전</button>
      <h2 id="monthTitle"></h2>
      <button onclick="nextMonth()">다음</button>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="team-select">
      <strong>근무조 선택</strong>
      <div class="team-options">
        <label><input type="radio" name="team" value="A" checked> A조</label>
        <label><input type="radio" name="team" value="B"> B조</label>
        <label><input type="radio" name="team" value="C"> C조</label>
        <label><input type="radio" name="team" value="D"> D조</label>
      </div>
    </div>
  </div>
</div>

<div id="workPage" class="tab-page">
  <div class="container">
    <div class="card" id="workCard"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="calendarNav" onclick="showTab('calendar')">📅 캘린더</button>
  <button class="nav-btn" id="workNav" onclick="showTab('work')">✅ 업무</button>
</div>

<script>
  const calendar = document.getElementById('calendar');
  const monthTitle = document.getElementById('monthTitle');
  const workCard = document.getElementById('workCard');
  let currentDate = new Date();
  let selectedTeam = localStorage.getItem('selectedTeam') || 'A';
  let workState = { type:null, time:null, direction:null };

  const shiftPattern = {
    A: ['휴무','주간','야간','비번'],
    B: ['주간','야간','비번','휴무'],
    C: ['야간','비번','휴무','주간'],
    D: ['비번','휴무','주간','야간']
  };
  const teams = ['A','B','C','D'];
  const baseDate = new Date(2026, 6, 2); // 2026-07-02 = A휴무, B주간, C야간, D비번

  document.querySelectorAll("input[name='team']").forEach(r => {
    r.checked = r.value === selectedTeam;
    r.addEventListener('change', e => {
      selectedTeam = e.target.value;
      localStorage.setItem('selectedTeam', selectedTeam);
      renderCalendar();
    });
  });

  function getShift(team, date){
    const diff = Math.floor((date - baseDate) / 86400000);
    const idx = ((diff % 4) + 4) % 4;
    return shiftPattern[team][idx];
  }

  function renderCalendar(){
    calendar.innerHTML = '';
    const y = currentDate.getFullYear();
    const m = currentDate.getMonth();
    monthTitle.textContent = `${y}년 ${m+1}월`;
    const weekdays = ['일','월','화','수','목','금','토'];
    weekdays.forEach((w,i)=>{
      const div = document.createElement('div');
      div.className = 'weekday' + (i===0?' sun':'') + (i===6?' sat':'');
      div.textContent = w;
      calendar.appendChild(div);
    });
    const first = new Date(y,m,1);
    const lastDate = new Date(y,m+1,0).getDate();
    for(let i=0;i<first.getDay();i++){
      const empty=document.createElement('div'); empty.className='day empty'; calendar.appendChild(empty);
    }
    for(let d=1; d<=lastDate; d++){
      const date = new Date(y,m,d);
      const cell = document.createElement('div');
      cell.className = 'day';
      const today = new Date();
      if(date.getFullYear()===today.getFullYear() && date.getMonth()===today.getMonth() && date.getDate()===today.getDate()) cell.classList.add('today');
      const myShift = getShift(selectedTeam, date);
      const others = teams.filter(t=>t!==selectedTeam).map(t=>({team:t, shift:getShift(t,date)})).filter(x=>x.shift==='주간' || x.shift==='야간');
      cell.innerHTML = `<div class="date-number">${d}</div><div class="my-shift">${myShift}</div><div class="others-row">${others.map(o=>`<span class="other-shift">${o.team}${o.shift}</span>`).join('')}</div>`;
      calendar.appendChild(cell);
    }
  }
  function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
  function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

  function showTab(tab){
    document.getElementById('calendarPage').classList.toggle('active', tab==='calendar');
    document.getElementById('workPage').classList.toggle('active', tab==='work');
    document.getElementById('calendarNav').classList.toggle('active', tab==='calendar');
    document.getElementById('workNav').classList.toggle('active', tab==='work');
    if(tab==='work') renderWorkStep();
  }

  function renderWorkStep(){
    if(!workState.type){
      workCard.innerHTML = `<p class="step-title">업무 종류 선택</p><p class="step-sub">먼저 어떤 업무인지 골라주세요.</p><div class="choice-grid"><button class="choice" onclick="setWork('type','안내')">안내 <span>승강장·고객 안내</span></button><button class="choice" onclick="setWork('type','매표')">매표 <span>승차권·창구 업무</span></button><button class="choice" onclick="setWork('type','상황근무')">상황근무 <span>상황 대응·기록</span></button></div>`;
      return;
    }
    if(!workState.time){
      workCard.innerHTML = `<button class="back" onclick="backWork('type')">← 이전</button><p class="step-title">근무시간 선택</p><p class="step-sub">${workState.type} 업무의 근무시간을 골라주세요.</p><div class="choice-grid"><button class="choice" onclick="setWork('time','주간')">주간 <span>낮 근무</span></button><button class="choice" onclick="setWork('time','야간')">야간 <span>밤 근무</span></button></div>`;
      return;
    }
    if(workState.type==='안내' && !workState.direction){
      workCard.innerHTML = `<button class="back" onclick="backWork('time')">← 이전</button><p class="step-title">방향 선택</p><p class="step-sub">안내할 방향을 골라주세요.</p><div class="choice-grid"><button class="choice" onclick="setWork('direction','상행')">상행 <span>익산·서울 방면</span></button><button class="choice" onclick="setWork('direction','하행')">하행 <span>순천·여수 방면</span></button></div>`;
      return;
    }
    renderChecklist();
  }
  function setWork(key,val){ workState[key]=val; renderWorkStep(); }
  function backWork(key){
    if(key==='type') workState={type:null,time:null,direction:null};
    if(key==='time') { workState.time=null; workState.direction=null; }
    if(key==='direction') workState.direction=null;
    renderWorkStep();
  }
  function resetWork(){ workState={type:null,time:null,direction:null}; renderWorkStep(); }

  function renderChecklist(){
    const title = [workState.type, workState.time, workState.direction].filter(Boolean).join(' · ');
    let items = [];
    if(workState.type==='안내'){
      items = workState.time==='주간' ? ['09:10 화장실 점검','09:10 리프트 점검','09:10 유실물 갯수 확인','10:00 수유방 점검','11:00 화장실 점검','13:00 화장실 점검','14:00 수유방 점검','15:00 화장실 점검','17:00 화장실 점검','17:00 유실물 갯수 확인'] : ['야간 인수인계 확인','승강장 안전 점검','취약시간대 순회','화장실 상태 확인','특이사항 기록'];
    } else if(workState.type==='매표') {
      items = ['창구 주변 정리','승차권 발권 상태 확인','환불·변경 민원 확인','마감 전 현금·영수증 확인','특이사항 기록'];
    } else {
      items = ['상황 접수 내용 확인','관련 부서 연락','현장 확인','조치 내용 기록','인수인계 작성'];
    }
    workCard.innerHTML = `<button class="back" onclick="${workState.type==='안내' ? "backWork('direction')" : "backWork('time')"}">← 이전</button><p class="step-title">체크리스트</p><div class="summary">${title}</div>${items.map((it,i)=>`<label class="check-item"><input type="checkbox" id="ck${i}"><span>${it}</span></label>`).join('')}<p class="step-sub" style="margin-top:16px;">메모</p><textarea placeholder="특이사항을 적어주세요"></textarea><button style="width:100%;margin-top:12px;" onclick="resetWork()">처음부터 다시 선택</button>`;
  }

  renderCalendar();
</script>
</body>
</html>
